# Nginx configuration for serving the production-built Angular
# admin panel. The container listens on port 80 and should be mapped
# to host port 82 by Docker compose. The app is served at the
# container root (/).

pid /tmp/nginx.pid;

user nginx;
worker_processes auto;

error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log to stdout/stderr for Docker-friendly output
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;

        root /usr/share/nginx/html;

        location / {
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # Generic error page
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # Static asset caching (exclude index.html)
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|ttf|svg|eot|otf|mp4|webm)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public";
        }

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}

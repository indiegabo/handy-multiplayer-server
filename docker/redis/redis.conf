########################################
# Redis Configuration for HMS
########################################

#---------------------------------------
# GENERAL
#---------------------------------------
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 10

#---------------------------------------
# SECURITY
#---------------------------------------
# Pass the password via:
#   redis-server /usr/local/etc/redis/redis.conf --requirepass <password>

#---------------------------------------
# MEMORY MANAGEMENT
#---------------------------------------
# maxmemory 512mb
maxmemory-policy noeviction

#---------------------------------------
# PERSISTENCE
#---------------------------------------
save 900 1
save 300 10
save 60 10000
appendonly no

#---------------------------------------
# LOGGING
#---------------------------------------
loglevel notice
logfile ""

#---------------------------------------
# CLIENTS
#---------------------------------------
maxclients 10000

#---------------------------------------
# ADVANCED
#---------------------------------------
activedefrag yes
protected-mode no

name: ${STACK_NAME:-handy-multiplayer-server}

# ──────────────────────────────────────────────────────────────────────────────
# VOLUMES
# ──────────────────────────────────────────────────────────────────────────────
volumes:
  app-admin-panel-cache:
    driver: local
  postgresql-data:
    driver: local
  mongodb-data:
    driver: local
  redis-data:
    driver: local

# ──────────────────────────────────────────────────────────────────────────────
# NETWORKS
# ──────────────────────────────────────────────────────────────────────────────
networks:
  hms-network:
    name: hms-network
    driver: bridge

  hms-internal-network:
    name: hms-internal-network
    driver: bridge
    ipam:
      config:
        - subnet: "172.16.0.0/21"

# ──────────────────────────────────────────────────────────────────────────────
# SERVICES
# ──────────────────────────────────────────────────────────────────────────────
services:
  # ────────────────────────────────────────────────────────────────────────────
  # STACK READINESS GATE
  # ────────────────────────────────────────────────────────────────────────────
  hms-stack-ready:
    container_name: "${STACK_READY:-hms-stack-ready}"
    image: "alpine:3.20"
    command:
      - "sh"
      - "-c"
      - "tail -f /dev/null"

    depends_on:
      hms-admin-panel:
        condition: service_healthy

    networks:
      hms-network: {}

  # ────────────────────────────────────────────────────────────────────────────
  # SHARED TYPES WATCHER
  # ────────────────────────────────────────────────────────────────────────────
  hms-shared-types-watch:
    container_name: "${STACK_SHARED_TYPES_WATCH:-hms-shared-types-watch}"
    build:
      context: .
      dockerfile: app-api/docker/Dockerfile
      target: dev
    image: ${APP_OWNER}/${STACK_SHARED_TYPES_WATCH:-hms-shared-types-watch}

    volumes:
      - ./app-shared-types:/workspace/app-shared-types:z

    env_file:
      - ./.env

    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - TSC_WATCHFILE=UsePolling
      - TSC_WATCHDIRECTORY=RecursiveDirectoryUsingPolling

    command: >
      sh -c "npm run -w @hms/shared-types build:watch:docker"

    networks:
      hms-network: {}

  # ────────────────────────────────────────────────────────────────────────────
  # HMS SYSTEM (NestJS)
  # ────────────────────────────────────────────────────────────────────────────
  hms-system:
    container_name: "${STACK_SYSTEM:-hms-system}"
    build:
      context: .
      dockerfile: app-system/docker/Dockerfile
      target: dev
    image: ${APP_OWNER}/${STACK_SYSTEM:-hms-system}

    ports:
      - "${HMS_SYSTEM_PORT:-81}:${HMS_SYSTEM_APP_PORT:-3000}"

    volumes:
      - ./app-system:/workspace/app-system:z
      - ./app-shared-types:/workspace/app-shared-types:z
      - /var/run/docker.sock:/var/run/docker.sock:z

    env_file:
      - ./.env

    environment:
      - PORT=${HMS_SYSTEM_APP_PORT:-3000}
      - NODE_ENV=${APP_ENVIRONMENT}
      - NODE_OPTIONS=--require tsconfig-paths/register
      - TS_NODE_PROJECT=/workspace/app-system/tsconfig.json
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CHOKIDAR_USEPOLLING=true

    command: >
      sh -c "npm --workspace @hms/system run start:debug:docker"

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://localhost:${HMS_SYSTEM_APP_PORT:-3000}/v1/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

    networks:
      hms-network: {}
      hms-internal-network:
        ipv4_address: 172.16.0.3

    depends_on:
      hms-shared-types-watch:
        condition: service_started
      hms-db-main:
        condition: service_healthy
      hms-db-game:
        condition: service_healthy
      hms-redis:
        condition: service_healthy
      mailhog:
        condition: service_started

  # ────────────────────────────────────────────────────────────────────────────
  # HMS API (NestJS)
  # ────────────────────────────────────────────────────────────────────────────
  hms-api:
    container_name: "${STACK_API:-hms-api}"
    build:
      context: .
      dockerfile: app-api/docker/Dockerfile
      target: dev
    image: ${APP_OWNER}/${STACK_API:-hms-api}

    ports:
      - "${HMS_API_PORT:-80}:${HMS_API_APP_PORT:-3000}"

    volumes:
      - ./app-api:/workspace/app-api:z
      - ./app-shared-types:/workspace/app-shared-types:z
      - /var/run/docker.sock:/var/run/docker.sock:z

    env_file:
      - ./.env

    environment:
      - PORT=${HMS_API_APP_PORT:-3000}
      - NODE_ENV=${APP_ENVIRONMENT}
      - NODE_OPTIONS=--require tsconfig-paths/register
      - TS_NODE_PROJECT=/workspace/app-api/tsconfig.json
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CHOKIDAR_USEPOLLING=true

    command: >
      sh -c "npm --workspace @hms/api run start:debug:docker"

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://localhost:${HMS_API_APP_PORT:-3000}/v1/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

    networks:
      hms-network: {}
      hms-internal-network:
        ipv4_address: 172.16.0.2

    depends_on:
      hms-shared-types-watch:
        condition: service_started
      hms-system:
        condition: service_healthy
      hms-db-main:
        condition: service_healthy
      hms-db-game:
        condition: service_healthy
      hms-redis:
        condition: service_healthy
      mailhog:
        condition: service_started

  # ────────────────────────────────────────────────────────────────────────────
  # HMS ADMIN PANEL (Angular)
  # ────────────────────────────────────────────────────────────────────────────
  hms-admin-panel:
    container_name: "${STACK_ADMIN_PANEL:-hms-admin-panel}"
    build:
      context: .
      dockerfile: app-admin-panel/docker/Dockerfile
      target: dev
    image: ${APP_OWNER}/${STACK_ADMIN_PANEL:-hms-admin-panel}

    ports:
      - "${HMS_ADMIN_PANEL_PORT:-82}:4200"

    volumes:
      - ./app-admin-panel:/workspace/app-admin-panel:z
      - ./app-shared-types:/workspace/app-shared-types:z
      - app-admin-panel-cache:/workspace/app-admin-panel/.angular/cache

    # Start commands use npm --prefix to run per-package scripts inside
    # the container without requiring npm workspaces.
    command: >
      sh -c "npm --prefix /workspace/app-admin-panel run start:docker"

    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - WATCHPACK_POLLING=true
      - NG_CLI_ANALYTICS=ci

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4200/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

    networks:
      hms-network: {}

    depends_on:
      hms-shared-types-watch:
        condition: service_started
      hms-api:
        condition: service_healthy

  # ────────────────────────────────────────────────────────────────────────────
  # REDIS
  # ────────────────────────────────────────────────────────────────────────────
  hms-redis:
    container_name: ${STACK_REDIS:-hms-redis}
    image: "redis:7.2.5"
    command:
      - "redis-server"
      - "/usr/local/etc/redis/redis.conf"
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD not set}"

    volumes:
      - "redis-data:/data"
      - "./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro,z"

    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "$REDIS_PASSWORD" --no-auth-warning PING >/dev/null 2>&1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      hms-internal-network:
        ipv4_address: 172.16.0.4

  # ────────────────────────────────────────────────────────────────────────────
  # POSTGRES
  # ────────────────────────────────────────────────────────────────────────────
  hms-db-main:
    container_name: ${STACK_DB_MAIN:-hms-db-main}
    image: "postgres:16.3"

    ports:
      - "${DB_MAIN_PORT:-5432}:5432"

    environment:
      POSTGRES_PASSWORD: "${DB_MAIN_ADMIN_PASSWORD}"
      POSTGRES_DB: "${DB_MAIN_DATABASE}"
      POSTGRES_USER: "postgres"
      POSTGRES_INITDB_ARGS: "--auth=trust --username=postgres"
      DB_MAIN_USERNAME: "${DB_MAIN_USERNAME}"
      DB_MAIN_PASSWORD: "${DB_MAIN_PASSWORD}"

    volumes:
      - "postgresql-data:/var/lib/postgresql/data"
      - "./docker/database/create-main-database.sh:/docker-entrypoint-initdb.d/10-create-main-database.sh:ro,z"

    healthcheck:
      test:
        - CMD-SHELL
        - >
          PGPASSWORD='${DB_MAIN_PASSWORD}' psql -U "${DB_MAIN_USERNAME}"
          -d "${DB_MAIN_DATABASE}" -v ON_ERROR_STOP=1 -c 'SELECT 1;' &&
          PGPASSWORD='${DB_MAIN_PASSWORD}' psql -U "${DB_MAIN_USERNAME}"
          -d "${DB_MAIN_DATABASE}" -v ON_ERROR_STOP=1 -c
          'CREATE TABLE IF NOT EXISTS public.healthcheck_test_table (id INT);
          DROP TABLE IF EXISTS public.healthcheck_test_table;'
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

    networks:
      hms-network: {}

  # ────────────────────────────────────────────────────────────────────────────
  # MONGODB
  # ────────────────────────────────────────────────────────────────────────────
  hms-db-game:
    container_name: ${STACK_DB_GAME:-hms-db-game}
    image: "mongo:7.0.12"

    ports:
      - "${DB_GAME_PORT:-27017}:27017"

    environment:
      MONGO_INITDB_DATABASE: ${DB_GAME_DATABASE}

    command:
      - bash
      - -c
      - |
        set -e
        mongod --bind_ip_all --replSet rs0 & \
        /docker-entrypoint-initdb.d/init-games-database-replicaset.sh && wait

    volumes:
      - "mongodb-data:/data/db"
      - "./docker/database/init-games-database-replicaset.sh:/docker-entrypoint-initdb.d/init-games-database-replicaset.sh:ro,z"

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "rs.status().ok"]
      interval: 10s
      timeout: 10s
      retries: 5

    networks:
      hms-network: {}

  # ────────────────────────────────────────────────────────────────────────────
  # MAILHOG
  # ────────────────────────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: hms-mailhog

    ports:
      - "8025:8025"
      - "1025:1025"

    networks:
      hms-network: {}
